name: drupal-varnish
type: service
from: varnish
fromVersionConstraint: "^1.0.0"
fromVersion: "1.0.0"
title: Varnish (Drupal)

    
labels:
- drupal
- varnish

configs:
- name: drupal
  title: Drupal preset
  filepath: /etc/gotpl/preset/drupal.vcl.tmpl
  config: drupal.vcl.tmpl

env:
- name: VARNISH_CONFIG_PRESET
  value: drupal
# Big headers in Drupal Cache-tags.
- name: VARNISHD_PARAM_HTTP_RESP_HDR_LEN
  value: 16k
